<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gerador de Escalas - Farmácia</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🏥 Escala Farmácia - Abril 2026</h1>
    
    <div class="controls">
      <button id="btnGerar">Gerar Escala</button>
      <select id="filtroCategoria">
        <option value="todos">Todos</option>
        <option value="farmaceutico">Farmacêuticos</option>
        <option value="tecnico">Técnicos</option>
      </select>
      <button id="btnImprimir">Imprimir</button>
    </div>

    <div id="calendarioEscala">
      <!-- A escala será gerada aqui -->
      <p>Clique em "Gerar Escala" para iniciar.</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
