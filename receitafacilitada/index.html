<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Receita Facilitada INCA HC IV</title>
    
    <!-- Servidores ultra-rápidos e estáveis (Cloudflare) -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.3/babel.min.js" crossorigin></script>

    <style>
        @media print {
            @page { size: landscape; margin: 10mm; }
            body { background-color: white !important; }
            .nao-imprime { display: none !important; }
            .shadow-2xl { box-shadow: none !important; border: none !important; }
            .evitar-quebra { page-break-inside: avoid; }
            .folha-a4 { min-width: 100% !important; }
        }
        .scroll-suave { -webkit-overflow-scrolling: touch; }
    </style>
    
    <!-- Detetor de erros caso o ecrã tente ficar branco -->
    <script>
        window.onerror = function(msg, url, line) {
            var erroDiv = document.getElementById('erro-log');
            if(erroDiv) erroDiv.innerHTML = "Falha no sistema: " + msg + " (Linha: " + line + "). Tente recarregar a página.";
        };
    </script>
</head>
<body class="bg-slate-100 font-sans">
    
    <div id="root">
        <!-- Ecrã de carregamento visível até o React assumir o controlo -->
        <div style="display: flex; justify-content: center; align-items: center; height: 100vh; flex-direction: column; text-align: center; padding: 20px;">
            <h2 style="color: #059669; font-family: sans-serif; font-size: 24px; font-weight: bold;">A iniciar o sistema...</h2>
            <p style="color: #64748b; font-family: sans-serif; margin-top: 10px;">A transferir ficheiros seguros. Se este ecrã não desaparecer em 5 segundos, por favor atualize a página.</p>
            <div id="erro-log" style="color: red; margin-top: 20px; font-weight: bold; font-family: sans-serif;"></div>
        </div>
    </div>

    <!-- O motor da aplicação (data-presets diz ao navegador mobile antigo como ler o código) -->
    <script type="text/babel" data-presets="react,env">
        const { useState } = React;

        // --- BASE DE DADOS MOCK ---
        const MEDICAMENTOS_PADRAO = [
          { nome: "MORFINA 10 MG", indicacao: "PARA DOR", apresentacao: "comprimido", dosePadrao: "1" },
          { nome: "MORFINA 10 MG/ML (GOTAS)", indicacao: "PARA DOR", apresentacao: "gotas", dosePadrao: "6" },
          { nome: "DIPIRONA 500 MG", indicacao: "PARA DOR OU FEBRE", apresentacao: "comprimido", dosePadrao: "1" },
          { nome: "DIPIRONA 500 MG/ML (GOTAS)", indicacao: "PARA DOR OU FEBRE", apresentacao: "gotas", dosePadrao: "40" },
          { nome: "OMEPRAZOL 20 MG", indicacao: "PARA PROTEGER O ESTÔMAGO", apresentacao: "comprimido", dosePadrao: "1" },
          { nome: "LACTULOSE", indicacao: "PARA PRISÃO DE VENTRE", apresentacao: "liquido", dosePadrao: "15" },
          { nome: "BROMOPRIDA 10 MG", indicacao: "PARA ENJOO OU VÔMITO", apresentacao: "comprimido", dosePadrao: "1" },
          { nome: "ONDANSETRONA 8 MG", indicacao: "PARA ENJOO OU VÔMITO", apresentacao: "comprimido", dosePadrao: "1" },
          { nome: "DEXAMETASONA 4 MG", indicacao: "PARA APETITE E CANSAÇO", apresentacao: "comprimido", dosePadrao: "1" },
          { nome: "GABAPENTINA 300 MG", indicacao: "PARA DOR", apresentacao: "comprimido", dosePadrao: "1" },
          { nome: "SIMETICONA GOTAS", indicacao: "PARA GASES", apresentacao: "gotas", dosePadrao: "30" },
          { nome: "LOSARTANA 50 MG", indicacao: "PARA PRESSÃO ALTA", apresentacao: "comprimido", dosePadrao: "1" },
          { nome: "OUTRO (DIGITAR MANUALMENTE)...", indicacao: "", apresentacao: "comprimido", dosePadrao: "1" }
        ];

        const HORARIOS_PADRAO = ["06:00", "08:00", "10:00", "12:00", "14:00", "16:00", "18:00", "22:00", "00:00"];

        // --- ÍCONES ---
        const Icons = {
            Plus: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>,
            Printer: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 6 2 18 2 18 9"></polyline><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"></path><rect x="6" y="14" width="12" height="8"></rect></svg>,
            Trash2: () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>,
            Clock: ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>,
            Sun: ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="5"></circle><line x1="12" y1="1" x2="12" y2="3"></line><line x1="12" y1="21" x2="12" y2="23"></line><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line><line x1="1" y1="12" x2="3" y2="12"></line><line x1="21" y1="12" x2="23" y2="12"></line><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line></svg>,
            Moon: ({className}) => <svg className={className} width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>,
            Info: () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>,
            AlertCircle: ({size=24, className}) => <svg className={className} width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
        };

        const IconeDose = ({ tipo, quantidade }) => {
            if (tipo === 'comprimido') {
                return (
                <div className="flex flex-col items-center justify-center">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-blue-600">
                    <path d="M10 5l9 9a4.95 4.95 0 1 1-7 7l-9-9a4.95 4.95 0 0 1 7-7Z" /><path d="m7.5 9.5 7 7" />
                    </svg>
                    <span className="text-[10px] font-bold mt-1 leading-tight">{quantidade} comp.</span>
                </div>
                );
            }
            if (tipo === 'meio_comprimido') {
                return (
                <div className="flex flex-col items-center justify-center">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-orange-500">
                    <path d="M10 5l4.5 4.5" /><path d="m7.5 9.5 7 7" strokeDasharray="2 2" /><path d="M5 12a4.95 4.95 0 0 0 7 7l4.5-4.5" />
                    </svg>
                    <span className="text-[10px] font-bold mt-1 text-orange-600 leading-tight">Metade (1/2)</span>
                </div>
                );
            }
            if (tipo === 'gotas') {
                return (
                <div className="flex flex-col items-center justify-center">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor" className="text-cyan-500">
                    <path d="M12 22a7 7 0 0 0 7-7c0-2-1-3.9-3-5.5s-3.5-4-4-6.5c-.5 2.5-2 4.9-4 6.5C6 11.1 5 13 5 15a7 7 0 0 0 7 7z" />
                    </svg>
                    <span className="text-[10px] font-bold mt-1 leading-tight">{quantidade} gotas</span>
                </div>
                );
            }
            if (tipo === 'liquido') {
                return (
                <div className="flex flex-col items-center justify-center">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className="text-emerald-600">
                    <path d="M4 4h16v4a8 8 0 0 1-16 0V4z" /><path d="M12 12v9" /><path d="M8 21h8" />
                    </svg>
                    <span className="text-[10px] font-bold mt-1 leading-tight">{quantidade} ml</span>
                </div>
                );
            }
            return <span className="text-sm font-bold">{quantidade}</span>;
        };

        // --- COMPONENTE DE EDIÇÃO (Movido para fora para evitar bugs de foco no telemóvel) ---
        const PrescricaoRowEditor = ({ item, isSos, updatePrescricao, removePrescricao, toggleHorario }) => (
            <div className="bg-white p-4 rounded-lg shadow-sm border border-slate-200 mb-4 nao-imprime relative">
                <button onClick={() => removePrescricao(item.id, isSos)} className="absolute top-2 right-2 text-red-500 hover:text-red-700 bg-red-50 p-2 rounded-full md:relative md:top-0 md:right-0 md:bg-transparent">
                    <Icons.Trash2 />
                </button>
                
                <div className="flex flex-col md:flex-row justify-between items-start mb-3 gap-4 pt-6 md:pt-0">
                    <div className="flex-1 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-4 gap-3 w-full">
                        <div className="col-span-1 sm:col-span-2">
                            <label className="block text-xs font-semibold text-slate-500 mb-1">Medicamento</label>
                            <div className="flex flex-col sm:flex-row gap-2">
                                <select 
                                    className="p-3 md:p-2 border rounded-lg md:rounded text-sm flex-1 bg-slate-50 w-full"
                                    onChange={(e) => updatePrescricao(item.id, 'nome', e.target.value, isSos)}
                                    value={MEDICAMENTOS_PADRAO.some(m => m.nome === item.nome) ? item.nome : (item.nome ? "OUTRO (DIGITAR MANUALMENTE)..." : "")}
                                >
                                    <option value="">Selecione...</option>
                                    {MEDICAMENTOS_PADRAO.map(med => (
                                        <option key={med.nome} value={med.nome}>{med.nome}</option>
                                    ))}
                                </select>
                                {!MEDICAMENTOS_PADRAO.some(m => m.nome === item.nome) && item.nome !== "" && (
                                    <input 
                                        type="text" 
                                        className="p-3 md:p-2 border rounded-lg md:rounded text-sm flex-1 w-full mt-2 sm:mt-0"
                                        placeholder="Nome do remédio livre"
                                        value={item.nome}
                                        onChange={(e) => updatePrescricao(item.id, 'nome', e.target.value, isSos)}
                                    />
                                )}
                            </div>
                        </div>

                        <div className="w-full">
                            <label className="block text-xs font-semibold text-slate-500 mb-1">Apresentação (Símbolo)</label>
                            <select 
                                className="w-full p-3 md:p-2 border rounded-lg md:rounded text-sm"
                                value={item.apresentacao}
                                onChange={(e) => updatePrescricao(item.id, 'apresentacao', e.target.value, isSos)}
                            >
                                <option value="comprimido">Comprimido/Cápsula</option>
                                <option value="meio_comprimido">Meio (1/2) Comprimido</option>
                                <option value="gotas">Gotas</option>
                                <option value="liquido">Líquido (Xarope/ml)</option>
                            </select>
                        </div>

                        <div className="w-full">
                            <label className="block text-xs font-semibold text-slate-500 mb-1">Dose / Quantidade</label>
                            <input 
                                type="text" 
                                className="w-full p-3 md:p-2 border rounded-lg md:rounded text-sm font-bold"
                                value={item.dose}
                                placeholder="Ex: 1, 40, 15"
                                onChange={(e) => updatePrescricao(item.id, 'dose', e.target.value, isSos)}
                            />
                        </div>
                    </div>
                </div>

                <div className="mb-4">
                    <label className="block text-xs font-semibold text-slate-500 mb-1">Para que serve? (Destaque visual na receita)</label>
                    <input 
                        type="text" 
                        className="w-full p-3 md:p-2 border rounded-lg md:rounded border-blue-200 bg-blue-50 text-blue-800 font-semibold"
                        placeholder="Ex: PARA DOR FORTE"
                        value={item.indicacao}
                        onChange={(e) => updatePrescricao(item.id, 'indicacao', e.target.value, isSos)}
                    />
                </div>

                {!isSos ? (
                    <div>
                        <label className="block text-xs font-semibold text-slate-500 mb-2">Clique nos Horários Fixos que o paciente deve tomar:</label>
                        <div className="flex flex-wrap gap-2">
                            {HORARIOS_PADRAO.map(hora => (
                                <button
                                    key={hora} type="button" onClick={() => toggleHorario(item.id, hora)}
                                    className={`px-4 py-2 md:px-3 md:py-1.5 rounded-full text-sm font-bold border transition-colors flex-1 sm:flex-none text-center ${
                                        item.horarios[hora] ? 'bg-emerald-500 text-white border-emerald-600 shadow-inner' : 'bg-white text-slate-600 border-slate-300 hover:bg-slate-100'
                                    }`}
                                >
                                    {hora}
                                </button>
                            ))}
                        </div>
                    </div>
                ) : (
                    <div>
                        <label className="block text-xs font-semibold text-slate-500 mb-1">Instruções S.O.S (Como e quando tomar):</label>
                        <textarea 
                            className="w-full p-3 md:p-2 border rounded-lg md:rounded text-sm bg-yellow-50 border-yellow-200"
                            rows="2"
                            placeholder="Ex: Tomar 1 comprimido de 4/4h se tiver dor forte."
                            value={item.instrucaoEspecial}
                            onChange={(e) => updatePrescricao(item.id, 'instrucaoEspecial', e.target.value, isSos)}
                        />
                    </div>
                )}
            </div>
        );

        function App() {
            const [paciente, setPaciente] = useState({
                nome: '', prontuario: '', data: new Date().toISOString().split('T')[0], medico: '', farmaceutico: ''
            });

            const [prescricoes, setPrescricoes] = useState([]);
            const [sos, setSos] = useState([]);

            const handlePacienteChange = (e) => {
                setPaciente({ ...paciente, [e.target.name]: e.target.value });
            };

            const addPrescricao = (isSos = false) => {
                const novaPrescricao = {
                    id: Date.now(), nome: '', apresentacao: 'comprimido', dose: '1', indicacao: '',
                    horarios: {}, instrucaoEspecial: ''
                };
                if (isSos) setSos([...sos, novaPrescricao]);
                else setPrescricoes([...prescricoes, novaPrescricao]);
            };

            const updatePrescricao = (id, field, value, isSos = false) => {
                const list = isSos ? sos : prescricoes;
                const setList = isSos ? setSos : setPrescricoes;
                
                const updatedList = list.map(item => {
                    if (item.id === id) {
                        let updatedItem = { ...item, [field]: value };
                        if (field === 'nome' && value) {
                            const medDB = MEDICAMENTOS_PADRAO.find(m => m.nome === value);
                            if (medDB && medDB.nome !== "OUTRO (DIGITAR MANUALMENTE)...") {
                                updatedItem.indicacao = medDB.indicacao;
                                updatedItem.apresentacao = medDB.apresentacao;
                                updatedItem.dose = medDB.dosePadrao;
                            } else if (value === "OUTRO (DIGITAR MANUALMENTE)...") {
                                updatedItem.nome = "";
                            }
                        }
                        return updatedItem;
                    }
                    return item;
                });
                setList(updatedList);
            };

            const toggleHorario = (id, horario) => {
                const updatedList = prescricoes.map(item => {
                    if (item.id === id) {
                        const novosHorarios = { ...item.horarios };
                        novosHorarios[horario] = !novosHorarios[horario];
                        return { ...item, horarios: novosHorarios };
                    }
                    return item;
                });
                setPrescricoes(updatedList);
            };

            const removePrescricao = (id, isSos = false) => {
                if (isSos) setSos(sos.filter(item => item.id !== id));
                else setPrescricoes(prescricoes.filter(item => item.id !== id));
            };

            const handlePrint = () => window.print();

            return (
                <div className="pb-20">
                    <div className="bg-slate-800 text-white p-4 shadow-md sticky top-0 z-50 nao-imprime flex flex-col sm:flex-row justify-between items-center gap-3">
                        <div className="text-center sm:text-left w-full sm:w-auto">
                            <h1 className="text-lg sm:text-xl font-bold flex items-center justify-center sm:justify-start gap-2">
                                <span className="bg-emerald-500 text-white p-1 rounded"><Icons.Plus /></span>
